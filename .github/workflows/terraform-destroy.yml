name: Terraform Destroy Infrastructure

on:
  # Manual trigger only - never automatic!
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev, staging, prod)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

      confirmation:
        description: 'Type "DESTROY" to confirm (case-sensitive)'
        required: true
        type: string

      reason:
        description: 'Reason for destroying infrastructure'
        required: true
        type: string

# Prevent concurrent destroy operations
concurrency:
  group: terraform-destroy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.0
  ENVIRONMENT: ${{ github.event.inputs.environment }}

jobs:
  validate-destroy:
    name: Validate Destroy Request
    runs-on: ubuntu-latest

    steps:
      - name: Check Confirmation Word
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DESTROY" ]; then
            echo "❌ Confirmation word must be exactly 'DESTROY' (case-sensitive)"
            echo "You entered: ${{ github.event.inputs.confirmation }}"
            exit 1
          fi
          echo "✅ Confirmation verified"

      - name: Validate Environment
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ ! "$ENV" =~ ^(dev|staging|prod)$ ]]; then
            echo "❌ Invalid environment: $ENV"
            exit 1
          fi
          echo "✅ Environment validated: $ENV"

      - name: Display Destruction Plan
        run: |
          echo "⚠️  =================================="
          echo "⚠️  INFRASTRUCTURE DESTRUCTION PLAN"
          echo "⚠️  =================================="
          echo ""
          echo "📋 Details:"
          echo "  • Environment: ${{ github.event.inputs.environment }}"
          echo "  • Triggered by: @${{ github.actor }}"
          echo "  • Reason: ${{ github.event.inputs.reason }}"
          echo "  • Time: $(date -u)"
          echo ""
          echo "🗑️  Resources to be DELETED:"
          echo "  • VPC: secure-vpc-vpc-${{ github.event.inputs.environment }}"
          echo "  • All Subnets (Public, Private, Data)"
          echo "  • NAT Gateways and Elastic IPs"
          echo "  • Internet Gateway"
          echo "  • Route Tables"
          echo "  • Security Groups"
          echo "  • Network ACLs"
          echo "  • VPC Endpoints"
          echo "  • VPC Flow Logs (CloudWatch + S3)"
          echo "  • IAM Roles"
          echo "  • KMS Keys (scheduled for deletion)"
          echo ""
          echo "⚠️  THIS ACTION CANNOT BE UNDONE!"
          echo "⚠️  =================================="

  terraform-destroy:
    name: Terraform Destroy
    needs: validate-destroy
    runs-on: ubuntu-latest
    environment:
      name: destruction-approval-${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Override Environment Variable
        run: |
          # Create a tfvars file with the correct environment
          cat > destroy.auto.tfvars <<EOF
          environment = "${{ github.event.inputs.environment }}"
          EOF

          echo "📝 Generated destroy.auto.tfvars:"
          cat destroy.auto.tfvars

      - name: Terraform Init
        id: init
        run: |
          terraform init
          echo "✅ Terraform initialized"

      - name: Terraform Plan Destroy
        id: plan-destroy
        run: |
          echo "🔍 Generating destruction plan..."
          terraform plan -destroy -out=destroy.tfplan

          echo "📊 Resources to be destroyed:"
          terraform show -no-color destroy.tfplan
        continue-on-error: false

      - name: Save Destroy Plan
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ github.event.inputs.environment }}
          path: destroy.tfplan
          retention-days: 7

      - name: Terraform Destroy
        id: destroy
        run: |
          echo "🗑️  Starting infrastructure destruction..."
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Triggered by: @${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo ""

          terraform destroy -auto-approve

          if [ $? -eq 0 ]; then
            echo ""
            echo "✅ =================================="
            echo "✅ INFRASTRUCTURE DESTROYED"
            echo "✅ =================================="
            echo ""
            echo "Destroyed: secure-vpc-vpc-${{ github.event.inputs.environment }}"
            echo "Time: $(date -u)"
          else
            echo ""
            echo "❌ =================================="
            echo "❌ DESTRUCTION FAILED"
            echo "❌ =================================="
            exit 1
          fi

      - name: Verify Destruction
        run: |
          echo "🔍 Verifying infrastructure was destroyed..."

          # Check if VPC still exists
          VPC_COUNT=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=secure-vpc" "Name=tag:Environment,Values=${{ github.event.inputs.environment }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Vpcs | length(@)' \
            --output text)

          echo "VPCs found: $VPC_COUNT"

          if [ "$VPC_COUNT" -eq 0 ]; then
            echo "✅ VPC successfully destroyed"
          else
            echo "⚠️  Warning: VPC may still exist (could be from a different deployment)"
          fi

      - name: Post Destruction Summary
        if: always()
        run: |
          echo "📊 Destruction Summary"
          echo "======================"
          echo ""
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Status: ${{ steps.destroy.outcome }}"
          echo "Triggered by: @${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Timestamp: $(date -u)"
          echo ""

          if [ "${{ steps.destroy.outcome }}" == "success" ]; then
            echo "✅ Infrastructure successfully destroyed"
            echo ""
            echo "⚠️  Reminder:"
            echo "  • Elastic IPs may take a few minutes to fully release"
            echo "  • KMS keys are scheduled for deletion (7-30 day waiting period)"
            echo "  • S3 buckets may still contain logs"
            echo "  • CloudWatch Log Groups may still exist"
          else
            echo "❌ Destruction failed - manual cleanup may be required"
            echo ""
            echo "Manual cleanup steps:"
            echo "1. Run: terraform destroy"
            echo "2. Or use: scripts/destroy_infrastructure.sh"
            echo "3. Or use AWS Console to manually delete resources"
          fi

  notify-destruction:
    name: Send Destruction Notification
    needs: terraform-destroy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create Destruction Report
        run: |
          cat > destruction_report.txt <<EOF
          ⚠️  INFRASTRUCTURE DESTRUCTION REPORT
          =====================================

          Environment: ${{ github.event.inputs.environment }}
          Status: ${{ needs.terraform-destroy.result }}
          Triggered by: @${{ github.actor }}
          Reason: ${{ github.event.inputs.reason }}
          Time: $(date -u)

          VPC Destroyed: secure-vpc-vpc-${{ github.event.inputs.environment }}
          Region: ${{ env.AWS_REGION }}

          Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          =====================================
          EOF

          cat destruction_report.txt

      - name: Upload Destruction Report
        uses: actions/upload-artifact@v4
        with:
          name: destruction-report-${{ github.event.inputs.environment }}
          path: destruction_report.txt
          retention-days: 90
